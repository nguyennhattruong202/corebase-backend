spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000

logging:
  level:
    com.corebase: DEBUG
    org.springframework.security: INFO

corebase:
  swagger:
    enabled: true