spring:
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    show-sql: false

logging:
  level:
    root: WARN
    com.corebase: INFO

corebase:
  swagger:
    enabled: false

server:
  error:
    include-stacktrace: never
    include-message: never